name: دانلود کامل وبسایت با HTTrack

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'آدرس وبسایت مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل ZIP'
        required: true
        type: string
      max_depth:
        description: 'حداکثر عمق (پیشفرض: 3)'
        required: false
        default: '3'
        type: string
      max_mb:
        description: 'حداکثر حجم دانلود به مگابایت (پیشفرض: 500)'
        required: false
        default: '500'
        type: string

permissions:
  contents: write

jobs:
  download-with-httrack:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب httrack و ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full httrack

      - name: دانلود وبسایت با httrack
        run: |
          # ایجاد پوشه پروژه
          mkdir -p website_mirror
          
          # اجرای httrack
          httrack "${{ github.event.inputs.website_url }}" \
            -O website_mirror \
            --depth=${{ github.event.inputs.max_depth }} \
            --max-rate=1000000 \
            --max-size=$(( ${{ github.event.inputs.max_mb }} * 1000000 )) \
            --stay-on-same-domain \
            --can-go-up-and-down \
            --robots=0 \
            --verbose \
            --mirror \
            --retries=3 \
            --timeout=30 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          
          # نمایش اطلاعات دانلود
          echo "📊 آمار دانلود httrack:"
          echo "محل ذخیره: website_mirror/${{ github.event.inputs.website_url }}/"
          
          # پیدا کردن پوشه اصلی (httrack یک پوشه با نام دامنه میسازه)
          MAIN_DIR=$(find website_mirror -type d -name "*$(echo ${{ github.event.inputs.website_url }} | sed 's/https\?:\/\///' | sed 's/\/.*//')*" | head -1)
          
          if [ -d "$MAIN_DIR" ]; then
            echo "تعداد کل فایل‌ها: $(find "$MAIN_DIR" -type f | wc -l)"
            echo "حجم کل: $(du -sh "$MAIN_DIR" | cut -f1)"
          fi

      - name: فشرده‌سازی وبسایت دانلود شده
        run: |
          # پیدا کردن پوشه اصلی
          MAIN_DIR=$(find website_mirror -type d -name "*$(echo ${{ github.event.inputs.website_url }} | sed 's/https\?:\/\///' | sed 's/\/.*//')*" | head -1)
          
          if [ -z "$MAIN_DIR" ]; then
            # اگر پوشه خاص پیدا نشد، کل محتوا رو فشرده کن
            MAIN_DIR="website_mirror"
          fi
          
          echo "فشرده‌سازی: $MAIN_DIR"
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=5 -v95m "website_archive.7z" "$MAIN_DIR"

      - name: پاکسازی
        run: rm -rf website_mirror

      - name: Commit و Push تکه‌ها
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن آرشیوها
          git add website_archive.7z* 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "⚠️ هیچ فایلی برای commit وجود ندارد"
            exit 1
          fi
          
          git commit -m "🌐 Mirror website: ${{ github.event.inputs.website_url }}"
          
          # Push با retry
          for attempt in {1..5}; do
            if git push; then
              echo "✅ Push موفقیت‌آمیز بود"
              break
            else
              echo "❌ Attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            fi
          done
