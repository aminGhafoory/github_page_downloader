name: دانلود کامل وبسایت با wget

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'آدرس وبسایت مورد نظر (مثال: https://example.com)'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل ZIP'
        required: true
        type: string
      max_depth:
        description: 'عمق لینک‌های دنبال شونده (پیشفرض: 5)'
        required: false
        default: '5'
        type: string
      wait_time:
        description: 'زمان تاخیر بین درخواست‌ها به ثانیه (پیشفرض: 1)'
        required: false
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  download-website:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب ابزارهای مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y p7zip-full wget

      - name: دانلود کامل وبسایت
        run: |
          # ایجاد پوشه برای ذخیره وبسایت
          mkdir -p website_download
          
          # دانلود با wget (میرور کامل سایت)
          wget \
            --mirror \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --no-parent \
            --wait=${{ github.event.inputs.wait_time }} \
            --limit-rate=1000k \
            --random-wait \
            --no-clobber \
            --continue \
            --directory-prefix=website_download \
            --level=${{ github.event.inputs.max_depth }} \
            --accept-regex=".*\.(html|css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot|xml|json|txt|pdf)$" \
            --execute robots=off \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "${{ github.event.inputs.website_url }}"
          
          # نمایش آمار دانلود
          echo "📊 آمار دانلود:"
          echo "تعداد کل فایل‌ها: $(find website_download -type f | wc -l)"
          echo "حجم کل: $(du -sh website_download | cut -f1)"

      - name: فشرده‌سازی رمزدار وبسایت
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=5 -v95m "website_archive.7z" website_download/

      - name: حذف فایل‌های موقت
        run: rm -rf website_download

      - name: Commit و Push تکه‌ها
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن تمام فایل‌های آرشیو
          if ls website_archive.7z* 1> /dev/null 2>&1; then
            git add website_archive.7z*
            
            # بررسی وجود تغییرات
            if ! git diff --staged --quiet; then
              git commit -m "Download complete website: ${{ github.event.inputs.website_url }}"
              
              # تلاش برای push با retry
              for attempt in {1..5}; do
                if git push; then
                  echo "✅ Push موفقیت‌آمیز بود"
                  break
                else
                  echo "❌ Push failed (attempt $attempt), retrying in 15 seconds..."
                  sleep 15
                fi
              done
            else
              echo "هیچ فایلی برای commit وجود ندارد"
              exit 1
            fi
          else
            echo "فایل آرشیو پیدا نشد!"
            exit 1
          fi
